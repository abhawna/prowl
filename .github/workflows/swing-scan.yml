# .github/workflows/swing-scan.yml
# ─────────────────────────────────────────────────────────────────────────────
# Runs the swing scanner every weekday at 5:00 AM Pacific (13:00 UTC)
# ─────────────────────────────────────────────────────────────────────────────
#
# SETUP (one-time, takes 3 minutes):
#   1. Push this repo to GitHub
#   2. Go to: Settings → Secrets and variables → Actions → New repository secret
#      Add these three secrets:
#        EMAIL_FROM  →  your Gmail address  (e.g. you@gmail.com)
#        EMAIL_TO    →  where to send alerts (can be same address)
#        EMAIL_PASS  →  Gmail App Password   (NOT your real password)
#
#      Gmail App Password: myaccount.google.com → Security → App Passwords
#      (Requires 2FA to be enabled on your Google account)
#
#   3. That's it — GitHub runs this free on their servers every weekday morning.
#
# MANUAL RUN:
#   Actions tab → "Swing Trade Scanner" → Run workflow
# ─────────────────────────────────────────────────────────────────────────────

name: Swing Trade Scanner

on:
  schedule:
    # Target: 6:35 AM Pacific, weekday mornings.
    # GitHub cron is ALWAYS UTC and does NOT observe daylight saving, so the
    # UTC time must be switched twice a year to keep 6:35 AM local:
    #   PDT (summer, UTC-7): 6:35 AM = 13:35 UTC → "35 13 * * 1-5"  ← current setting
    #   PST (winter, UTC-8): 6:35 AM = 14:35 UTC → "35 14 * * 1-5"
    - cron: "35 13 * * 1-5"   # 6:35 AM PDT · Mon–Fri only, skip weekends

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  scan:
    name: Run swing scanner
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO:   ${{ secrets.EMAIL_TO }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        run: python scanner.py
